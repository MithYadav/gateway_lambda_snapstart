name: Build and Deploy Spring Boot (OIDC)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: 🔍 Inspect JAR (Debug Step)
        run: |
          echo "--- Checking target directory sizes ---"
          ls -lh target/
          
          # Find the largest JAR (the shaded one)
          # We use this to make sure we don't upload the 2KB 'original' jar
          FAT_JAR=$(ls -S target/*.jar | head -1)
          echo "Identified Fat JAR: $FAT_JAR"
          
          echo "--- Verifying Handler Class inside $FAT_JAR ---"
          if jar tf "$FAT_JAR" | grep -q "com/example/test/StreamLambdaHandler.class"; then
            echo "✅ SUCCESS: StreamLambdaHandler found in $FAT_JAR"
          else
            echo "❌ ERROR: StreamLambdaHandler NOT found! Shading failed."
            exit 1
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::373447294485:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Update Lambda Code & Publish Version
        run: |
          # Dynamically pick the fat JAR identified in the previous step
          FAT_JAR=$(ls -S target/*.jar | head -1)
          
          # 1. Update Code
          aws lambda update-function-code \
            --function-name gateway_lambda_snapshot \
            --zip-file fileb://"$FAT_JAR"
          
          # 2. Wait for successful update
          aws lambda wait function-updated --function-name gateway_lambda_snapshot
          
          # 3. Publish New Version (SnapStart requires a version)
          VERSION=$(aws lambda publish-version --function-name gateway_lambda_snapshot --query Version --output text)
          echo "New Version Published: $VERSION"
          
          # 4. Point 'prod' alias to this version
          aws lambda update-alias \
            --function-name gateway_lambda_snapshot \
            --name prod \
            --function-version "$VERSION"

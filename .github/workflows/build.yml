name: Build and Deploy Spring Boot (OIDC)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # Mandatory for OIDC
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: 🔍 Debug & Inspect JAR (The Fix)
        run: |
          echo "--- Listing all files in target directory ---"
          ls -lh target/
          
          echo "--- Checking JAR content for the Handler class ---"
          # This will list the contents of the JAR and search for your handler
          # It helps verify if the Maven Shade plugin actually worked
          jar tf target/springboot-api-lambda-0.0.1-SNAPSHOT.jar | grep "StreamLambdaHandler" || echo "❌ Handler NOT FOUND in JAR!"
          
          echo "--- Checking File Size ---"
          # A proper shaded JAR should be > 30MB. If it's < 100KB, it's the wrong JAR.
          du -sh target/springboot-api-lambda-0.0.1-SNAPSHOT.jar

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::373447294485:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Update Lambda Code & Publish Version
        run: |
          # 1. Upload the JAR
          aws lambda update-function-code \
            --function-name gateway_lambda_snapshot \
            --zip-file fileb://target/springboot-api-lambda-0.0.1-SNAPSHOT.jar
          
          # 2. Wait for update to finish
          aws lambda wait function-updated --function-name gateway_lambda_snapshot
          
          # 3. Publish a new version
          VERSION=$(aws lambda publish-version --function-name gateway_lambda_snapshot --query Version --output text)
          echo "Published Version: $VERSION"
          
          # 4. Update the 'prod' alias
          aws lambda update-alias \
            --function-name gateway_lambda_snapshot \
            --name prod \
            --function-version $VERSION

name: Build and Deploy Spring Boot (OIDC)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # Mandatory for OIDC
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Verify Shaded JAR Content
        run: |
          echo "Verifying that the Handler class exists in the JAR..."
          if jar tf target/springboot-api-lambda-0.0.1-SNAPSHOT.jar | grep -q "StreamLambdaHandler"; then
            echo "✅ StreamLambdaHandler found!"
          else
            echo "❌ ERROR: StreamLambdaHandler NOT found in the JAR. Deployment will fail."
            exit 1
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::373447294485:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Update Lambda Code & Publish Version
        run: |
          # 1. Upload the JAR verified in the previous step
          aws lambda update-function-code \
            --function-name gateway_lambda_snapshot \
            --zip-file fileb://target/springboot-api-lambda-0.0.1-SNAPSHOT.jar
          
          # 2. Wait for the update to complete (especially important for SnapStart functions)
          aws lambda wait function-updated --function-name gateway_lambda_snapshot
          
          # 3. Publish a new version (This triggers the SnapStart snapshot creation)
          VERSION=$(aws lambda publish-version --function-name gateway_lambda_snapshot --query Version --output text)
          echo "Published Version: $VERSION"
          
          # 4. Point the 'prod' alias to the new version
          aws lambda update-alias \
            --function-name gateway_lambda_snapshot \
            --name prod \
            --function-version $VERSION
